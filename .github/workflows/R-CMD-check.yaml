# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  workflow_dispatch:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # specify so that we can find it later
      CHECK_DIR: check

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # RcppTOML and rextendr needed for vendoring process
          extra-packages: |
            any::rcmdcheck
            any::RcppTOML
            any::rextendr
          needs: check

      - uses: arduino/setup-protoc@v3
        # avoid rate limit errors, https://github.com/arduino/setup-protoc/issues/6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Vendor packages
        run: Rscript tools/vendor.R

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: false
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
          error-on: '"warning"'
          check-dir: '"${{ env.CHECK_DIR }}"'

      # We echo the SHA256 of the built .tar.gz so it can be validated that this is a GH Actions build
      - name: Echo SHA256 for verification
        if: ${{ (matrix.config.os == 'ubuntu-latest') && (matrix.config.r == 'release') }}
        run: "shasum -a 256 ${{ env.CHECK_DIR }}/gtfsrealtime_*.tar.gz"

      - name: Save
        if: ${{ (matrix.config.os == 'ubuntu-latest') && (matrix.config.r == 'release') }}
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: ${{ env.CHECK_DIR }}/gtfsrealtime_*.tar.gz
          archive: false
